<svg width="1600" height="1000" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="1600" height="1000" fill="#0a0a0a"/>
  
  <!-- Grid pattern -->
  <defs>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#1a1a1a" stroke-width="1"/>
    </pattern>
  </defs>
  <rect width="1600" height="1000" fill="url(#grid)"/>
  
  <!-- Accent gradient -->
  <defs>
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#a8ff78;stop-opacity:0.1" />
      <stop offset="100%" style="stop-color:#a8ff78;stop-opacity:0.05" />
    </linearGradient>
  </defs>
  <rect width="1600" height="1000" fill="url(#accentGrad)"/>
  
  <!-- Icon/Symbol -->
  <g transform="translate(800, 400)">
    <!-- Dollar sign circle -->
    <circle cx="0" cy="0" r="80" fill="none" stroke="#a8ff78" stroke-width="3" opacity="0.3"/>
    <text x="0" y="0" font-family="Arial, sans-serif" font-size="100" font-weight="bold" fill="#a8ff78" text-anchor="middle" dominant-baseline="central">$</text>
  </g>
  
  <!-- Project Title -->
  <text x="800" y="600" font-family="Arial, sans-serif" font-size="64" font-weight="bold" fill="#ffffff" text-anchor="middle">Expense Voyage</text>
  
  <!-- Subtitle -->
  <text x="800" y="670" font-family="Arial, sans-serif" font-size="28" fill="#888888" text-anchor="middle">Personal Finance Tracker</text>
  
  <!-- Tech badges -->
  <g transform="translate(800, 750)">
    <rect x="-180" y="0" width="80" height="32" rx="4" fill="#1a1a1a" stroke="#333333" stroke-width="1"/>
    <text x="-140" y="21" font-family="monospace" font-size="14" fill="#a8ff78" text-anchor="middle">PHP</text>
    
    <rect x="-90" y="0" width="100" height="32" rx="4" fill="#1a1a1a" stroke="#333333" stroke-width="1"/>
    <text x="-40" y="21" font-family="monospace" font-size="14" fill="#a8ff78" text-anchor="middle">MySQL</text>
    
    <rect x="20" y="0" width="110" height="32" rx="4" fill="#1a1a1a" stroke="#333333" stroke-width="1"/>
    <text x="75" y="21" font-family="monospace" font-size="14" fill="#a8ff78" text-anchor="middle">Chart.js</text>
  </g>
  
  <!-- Decorative elements -->
  <circle cx="200" cy="200" r="4" fill="#a8ff78" opacity="0.3"/>
  <circle cx="1400" cy="800" r="4" fill="#a8ff78" opacity="0.3"/>
  <circle cx="300" cy="850" r="3" fill="#a8ff78" opacity="0.2"/>
  <circle cx="1300" cy="150" r="3" fill="#a8ff78" opacity="0.2"/>
</svg>