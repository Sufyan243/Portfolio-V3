<svg width="1600" height="1000" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="1600" height="1000" fill="#0a0a0a"/>
  
  <!-- Grid pattern -->
  <defs>
    <pattern id="grid2" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#1a1a1a" stroke-width="1"/>
    </pattern>
  </defs>
  <rect width="1600" height="1000" fill="url(#grid2)"/>
  
  <!-- Accent gradient -->
  <defs>
    <linearGradient id="accentGrad2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#a8ff78;stop-opacity:0.1" />
      <stop offset="100%" style="stop-color:#a8ff78;stop-opacity:0.05" />
    </linearGradient>
  </defs>
  <rect width="1600" height="1000" fill="url(#accentGrad2)"/>
  
  <!-- Icon/Symbol - Document with code -->
  <g transform="translate(800, 380)">
    <!-- Document outline -->
    <rect x="-60" y="-80" width="120" height="160" rx="8" fill="none" stroke="#a8ff78" stroke-width="3" opacity="0.3"/>
    
    <!-- Code lines -->
    <line x1="-40" y1="-50" x2="40" y2="-50" stroke="#a8ff78" stroke-width="2" opacity="0.5"/>
    <line x1="-40" y1="-20" x2="20" y2="-20" stroke="#a8ff78" stroke-width="2" opacity="0.5"/>
    <line x1="-40" y1="10" x2="35" y2="10" stroke="#a8ff78" stroke-width="2" opacity="0.5"/>
    <line x1="-40" y1="40" x2="15" y2="40" stroke="#a8ff78" stroke-width="2" opacity="0.5"/>
  </g>
  
  <!-- Project Title -->
  <text x="800" y="600" font-family="Arial, sans-serif" font-size="64" font-weight="bold" fill="#ffffff" text-anchor="middle">AI Docs Assistant</text>
  
  <!-- Subtitle -->
  <text x="800" y="670" font-family="Arial, sans-serif" font-size="28" fill="#888888" text-anchor="middle">Automated Documentation Generator</text>
  
  <!-- Tech badges -->
  <g transform="translate(800, 750)">
    <rect x="-200" y="0" width="100" height="32" rx="4" fill="#1a1a1a" stroke="#333333" stroke-width="1"/>
    <text x="-150" y="21" font-family="monospace" font-size="14" fill="#a8ff78" text-anchor="middle">Node.js</text>
    
    <rect x="-90" y="0" width="80" height="32" rx="4" fill="#1a1a1a" stroke="#333333" stroke-width="1"/>
    <text x="-50" y="21" font-family="monospace" font-size="14" fill="#a8ff78" text-anchor="middle">Jest</text>
    
    <rect x="0" y="0" width="90" height="32" rx="4" fill="#1a1a1a" stroke="#333333" stroke-width="1"/>
    <text x="45" y="21" font-family="monospace" font-size="14" fill="#a8ff78" text-anchor="middle">CI/CD</text>
    
    <rect x="100" y="0" width="100" height="32" rx="4" fill="#1a1a1a" stroke="#333333" stroke-width="1"/>
    <text x="150" y="21" font-family="monospace" font-size="14" fill="#a8ff78" text-anchor="middle">GitHub</text>
  </g>
  
  <!-- Decorative elements -->
  <circle cx="200" cy="200" r="4" fill="#a8ff78" opacity="0.3"/>
  <circle cx="1400" cy="800" r="4" fill="#a8ff78" opacity="0.3"/>
  <circle cx="300" cy="850" r="3" fill="#a8ff78" opacity="0.2"/>
  <circle cx="1300" cy="150" r="3" fill="#a8ff78" opacity="0.2"/>
  
  <!-- AI sparkle effect -->
  <g transform="translate(950, 350)">
    <line x1="0" y1="-15" x2="0" y2="15" stroke="#a8ff78" stroke-width="2" opacity="0.4"/>
    <line x1="-15" y1="0" x2="15" y2="0" stroke="#a8ff78" stroke-width="2" opacity="0.4"/>
  </g>
  <g transform="translate(650, 380)">
    <line x1="0" y1="-10" x2="0" y2="10" stroke="#a8ff78" stroke-width="1.5" opacity="0.3"/>
    <line x1="-10" y1="0" x2="10" y2="0" stroke="#a8ff78" stroke-width="1.5" opacity="0.3"/>
  </g>
</svg>